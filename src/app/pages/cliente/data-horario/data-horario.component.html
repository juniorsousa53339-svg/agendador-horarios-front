<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <img src="assets/icon-logo.png" alt="logo">
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">

    <h2 class="titulo">Escolha data e horário</h2>

    <!-- DATA -->
    <div class="campo">
      <label>Data</label>

      <!-- campo fake estilizado -->
      <input
        type="text"
        placeholder="dd/mm/aaaa"
        class="input-data"
      >
    </div>

    <!-- HORÁRIOS -->
    <div class="horarios">

      <span class="subtitulo">Horário</span>

      <div class="grid-horarios">
        <div
          class="horario"
          *ngFor="let h of horarios"
          (click)="selecionarHorario(h)"
          [class.selecionado]="h === horarioSelecionado"
        >
          {{ h }}
        </div>
      </div>

    </div>

  </div>

  <!-- ERRO -->
  <div class="erro" *ngIf="erro">
    <span>{{ erro }}</span>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <button
      class="btn-proximo"
      [class.ativo]="horarioSelecionado"
      (click)="irParaConfirmacao()"
    >
      Próximo
    </button>
  </div>

</div>
