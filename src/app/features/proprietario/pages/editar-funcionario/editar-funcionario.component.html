  <div class="page">

    <!-- HEADER -->
    <div class="header">
      <button (click)="voltar()">←</button>
      <h1>Editar Funcionário</h1>
    </div>

    <!-- FORM -->
    <div class="form">

      <div class="input-group">
        <label>Nome</label>
        <input type="text" [(ngModel)]="funcionario.nomeFuncionario">
      </div>

      <div class="input-group">
        <label>Telefone</label>
        <input type="text" [(ngModel)]="funcionario.telefoneFuncionario">
      </div>

      <div class="input-group">
        <label>Especialidade</label>
        <input type="text" [(ngModel)]="funcionario.especialidade">
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="funcionario.email">
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" [(ngModel)]="funcionario.senha">
      </div>

      <!-- BOTÃO -->
      <button class="btn-salvar" (click)="salvar()">
        Salvar alterações
      </button>

    </div>

  </div>
