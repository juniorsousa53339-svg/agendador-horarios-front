<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <img src="assets/icon-logo.png" alt="logo">
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">

    <h2 class="titulo">Confirmar agendamento</h2>

    <!-- NOME -->
    <div class="campo">
      <label>Nome</label>
      <input
        type="text"
        placeholder="Digite seu nome"
        [(ngModel)]="nome"
      >
    </div>

    <!-- TELEFONE -->
    <div class="campo">
      <label>Telefone</label>
      <input
        type="text"
        placeholder="(00) 00000-0000"
        [(ngModel)]="telefone"
      >
    </div>

    <!-- ERRO -->
    <div class="erro" *ngIf="erro">
      <span>{{ erro }}</span>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <button
      class="btn-confirmar"
      (click)="confirmar()"
    >
      Confirmar agendamento
    </button>
  </div>

</div>
