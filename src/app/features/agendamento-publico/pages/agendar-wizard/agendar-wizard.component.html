<section class="wizard" *ngIf="state$ | async as state">
  <header class="wizard__header">
    <h1>Agendar horário</h1>
    <p>Passo {{ state.passoAtual }} de 5</p>
  </header>

  <main class="wizard__content" *ngIf="state.passoAtual === 1">
    <h2>Escolha o serviço</h2>

    <p class="erro" *ngIf="erro$ | async as erro">{{ erro }}</p>

    <div class="lista" *ngIf="(loading$ | async) === false; else loadingTpl">
      <app-servico-card
        *ngFor="let servico of (servicos$ | async) ?? []"
        [servico]="servico"
        [selecionado]="state.servicoSelecionado?.id === servico.id"
        (selecionar)="selecionarServico($event)"
      />
    </div>

    <ng-template #loadingTpl>
      <div class="skeleton" *ngFor="let i of [1,2,3]"></div>
    </ng-template>
  </main>

  <footer class="wizard__footer">
    <button
      class="btn-primary"
      [disabled]="!state.servicoSelecionado"
      (click)="proximoPasso()"
    >
      Próximo
    </button>
  </footer>
</section>
