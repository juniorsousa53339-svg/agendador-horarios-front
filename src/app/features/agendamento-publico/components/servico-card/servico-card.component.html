<button class="card" [class.card--selected]="selecionado" (click)="onClick()">

  <h3>{{ servico.nome }}</h3>

  <p >
    {{ servico.descricao }}
  </p>

  <div class="card__meta">
    <strong>{{ servico.preco | currency:'BRL' }}</strong>
    <span>{{ servico.duracaoMin }} min</span>
  </div>

  <div class="card__bottom">
    <span class="badge" *ngIf="selecionado">Selecionado</span>
  </div>

</button>
